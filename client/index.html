<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Geometry Explorer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!-- Fonts (Work Sans) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Design System Foundations -->
  <link rel="stylesheet" href="./design-system/colors/colors.css">
  <link rel="stylesheet" href="./design-system/spacing/spacing.css">
  <link rel="stylesheet" href="./design-system/typography/typography.css">

  <!-- Design System Components -->
  <link rel="stylesheet" href="./design-system/components/button/button.css">
  <link rel="stylesheet" href="./design-system/components/boxes/boxes.css">
  <link rel="stylesheet" href="./design-system/components/input/input.css">
  <link rel="stylesheet" href="./design-system/components/dropdown/dropdown.css">
  <link rel="stylesheet" href="./design-system/components/tags/tags.css">
  <link rel="stylesheet" href="./design-system/components/numeric-slider/numeric-slider.css">
  <link rel="stylesheet" href="./design-system/components/modal/modal.css">

  <!-- Template-specific components (layout, utilities, temporary components) -->
  <link rel="stylesheet" href="./bespoke-template.css" />
  <link rel="stylesheet" href="./geometry-explorer.css" />
</head>
<body class="bespoke">
  <main class="main-layout geometry-main">
    <aside class="sidebar geometry-sidebar" aria-label="Shape controls">
      <section class="box card geometry-sidebar-stack">
        <div class="geometry-panel-section" id="geometry-shape-panel">
          <h2 class="geometry-card-title heading-xxxsmall" id="geometry-shape-heading">Shape</h2>
          <div class="geometry-field geometry-field--compact" id="geometry-mode-field">
            <span class="geometry-field-label label-large" id="geometry-mode-label">Flat or solid</span>
            <div id="geometry-mode"></div>
          </div>
          <div class="geometry-field geometry-field--compact" id="geometry-shape-field">
            <span class="geometry-field-label label-large" id="geometry-shape-label">Figure</span>
            <div id="geometry-shape"></div>
          </div>
          <div class="geometry-field geometry-field--compact">
            <span class="geometry-field-label label-large" id="geometry-units-label">Units</span>
            <div id="geometry-units"></div>
          </div>
        </div>

        <div class="geometry-panel-section">
          <h2 class="geometry-card-title heading-xxxsmall">Measurements</h2>
          <ul id="geometry-metrics" class="geometry-metrics"></ul>
          <p id="geometry-formula-note" class="geometry-formula geometry-units-note body-xxsmall" aria-live="polite"></p>
        </div>

        <div class="geometry-panel-section geometry-panel-section--sliders">
          <h2 class="geometry-card-title heading-xxxsmall">Dimensions</h2>
          <p class="geometry-panel-lede body-xxsmall">Drag the tracks or type values to resize the figure.</p>
          <div id="geometry-sliders"></div>
        </div>
      </section>
    </aside>

    <div class="content-area geometry-content">
      <div class="geometry-stage">
        <div class="geometry-canvas-frame">
          <canvas id="geometry-canvas" width="640" height="400" aria-label="Figure preview"></canvas>
          <p id="geometry-canvas-hint" class="geometry-canvas-hint body-small" hidden>Drag to rotate</p>
        </div>
      </div>
    </div>
  </main>

  <script type="module" src="./app.js"></script>
  <script type="module" src="./geometry-explorer.js"></script>
</body>
</html>
